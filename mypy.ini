[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
plugins = pydantic.mypy

[mypy-tests.*]
ignore_errors = True

# Only ignore SQLAlchemy model files (declarative_base generates dynamic types - legitimate false positives)
[mypy-backend.models.*]
ignore_errors = True

# Ignore services with heavy SQLAlchemy Column operations (false positives from Column[T] vs T mismatches)
[mypy-backend.services.story_service]
ignore_errors = True

[mypy-backend.services.token_sync_service]
ignore_errors = True

[mypy-backend.services.trends_service]
ignore_errors = True

[mypy-backend.services.crud]
ignore_errors = True

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True

# Third-party libraries without type stubs
[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-rich.*]
ignore_missing_imports = True

[mypy-click.*]
ignore_missing_imports = True

[mypy-faker.*]
ignore_missing_imports = True
